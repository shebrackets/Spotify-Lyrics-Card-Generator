<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Lyrics Card Generator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="preview-side" id="capture-zone">
            <div class="shadow-wrapper">
                <div class="spotify-card" id="card">
                    <div class="card-header">
                        <div class="cover-wrapper">
                            <img id="card-cover" src="" alt="Album Cover" style="display: none;">
                            <div id="cover-placeholder">No Img</div>
                        </div>
                        <div class="track-info">
                            <h3 id="card-title">Titre de la musique</h3>
                            <p id="card-author">Titre • Artiste</p>
                        </div>
                    </div>
                    <div class="card-lyrics">
                        <p id="card-text">Vos paroles s'afficheront ici dès que vous commencerez à écrire...</p>
                    </div>
                    <div class="card-footer">
                        <svg viewBox="0 0 24 24" class="spotify-logo"><path fill="currentColor" d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424c-.18.295-.565.387-.86.207-2.377-1.454-5.37-1.783-8.893-.982-.336.075-.668-.135-.744-.47-.075-.336.135-.668.47-.743 3.856-.88 7.15-.51 9.822 1.13.296.178.387.563.206.858zm1.225-2.72c-.227.367-.707.487-1.074.26-2.72-1.672-6.87-2.157-10.08-1.182-.413.125-.848-.107-.973-.52-.125-.413.108-.847.52-.972 3.67-1.114 8.243-.574 11.35 1.34.366.226.486.706.26 1.073zm.106-2.833C14.385 8.71 8.54 8.517 5.16 9.543c-.515.156-1.054-.134-1.21-.65-.156-.515.134-1.054.65-1.21 3.89-1.18 10.34-.96 14.42 1.463.464.275.615.874.34 1.338-.276.464-.875.615-1.34.34z"/></svg>
                        <span>Spotify</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="controls-side">
            <h2>Personnaliser</h2>
            <div class="control-group">
                <label for="input-bg">Couleur de fond</label>
                <input type="color" id="input-bg" value="#591914">
            </div>
            <div class="control-group">
                <label>Image de couverture</label>
                <label for="input-cover" class="custom-file-upload">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                    <span id="file-name-text">Choisir un fichier</span>
                </label>
                <input type="file" id="input-cover" accept=".jpg, .jpeg, .png, .webp" style="display: none;">
            </div>
            <div class="control-group">
                <label for="input-title">Titre</label>
                <input type="text" id="input-title" placeholder="Ex: Life Goes On">
            </div>
            <div class="control-group">
                <label for="input-author">Artiste(s)</label>
                <input type="text" id="input-author" placeholder="Ex: Oliver Tree">
            </div>
            <div class="control-group">
                <label for="input-text">Paroles</label>
                <textarea id="input-text" rows="5" placeholder="Entrez les paroles ici..."></textarea>
                <p id="char-counter">0 / 220</p>
            </div>
            <button id="btn-export" disabled>Exporter en Image</button>
        </div>
    </div>
</body>
</html>
